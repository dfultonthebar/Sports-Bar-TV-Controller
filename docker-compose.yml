
version: '3.8'

services:
  sportsbar-controller:
    build: .
    container_name: sportsbar-av-controller
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - sportsbar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for session storage and caching
  redis:
    image: redis:7-alpine
    container_name: sportsbar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sportsbar-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: sportsbar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - sportsbar-controller
    networks:
      - sportsbar-network
    restart: unless-stopped

networks:
  sportsbar-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
