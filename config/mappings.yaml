
# AV System Configuration
# Maps Wolfpack video outputs to Atlas Atmosphere audio zones
# and video inputs to audio sources

output_to_zone_map:
  1: zone_1  # Main Bar TV → Main Bar speakers
  2: zone_2  # Patio TV → Patio speakers  
  3: zone_3  # Dining TV → Dining speakers
  4: zone_4  # Private Room TV → Private Room speakers

input_to_source_map:
  1: source_sports_espn    # ESPN video source → ESPN audio source
  2: source_sports_fox     # FOX Sports → FOX Sports audio
  3: source_menu_channel   # Digital menu → Menu channel audio
  4: source_music_stream   # Music HDMI → Music audio input

presets:
  big_game:
    description: "All TVs to ESPN, high volume for big games"
    routes:
      - {input: 1, output: 1, volume: 0.85}  # Main Bar
      - {input: 1, output: 2, volume: 0.85}  # Patio
      - {input: 1, output: 3, volume: 0.80}  # Dining
      - {input: 1, output: 4, volume: 0.75}  # Private Room

  chill:
    description: "Menu channel and background music, quiet atmosphere"
    routes:
      - {input: 3, output: 1, volume: 0.30}  # Menu on Main Bar
      - {input: 3, output: 2, volume: 0.30}  # Menu on Patio
      - {input: 4, output: 3, volume: 0.25}  # Music in Dining
      - {input: 4, output: 4, volume: 0.20}  # Music in Private Room

  multi_game:
    description: "Different games on different TVs"
    routes:
      - {input: 1, output: 1, volume: 0.75}  # ESPN on Main Bar
      - {input: 2, output: 2, volume: 0.75}  # FOX Sports on Patio
      - {input: 1, output: 3, volume: 0.60}  # ESPN on Dining (lower)
      - {input: 2, output: 4, volume: 0.70}  # FOX Sports on Private Room

  closing:
    description: "Closing time - menu channel, very low volume"
    routes:
      - {input: 3, output: 1, volume: 0.20}  # Menu everywhere
      - {input: 3, output: 2, volume: 0.20}
      - {input: 3, output: 3, volume: 0.15}
      - {input: 3, output: 4, volume: 0.15}
