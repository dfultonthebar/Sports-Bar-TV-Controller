
# AI Provider Configurations
# ==========================
# 
# To enable providers, set their API keys via environment variables:
# - OPENAI_API_KEY=your_openai_api_key
# - ANTHROPIC_API_KEY=your_anthropic_api_key  
# - GROK_API_KEY=your_grok_api_key

openai:
  enabled: false  # Will be enabled automatically if API key is provided
  name: "OpenAI GPT"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4"
  max_tokens: 4000
  temperature: 0.7
  timeout: 30
  
  # Rate limits (adjust based on your OpenAI tier)
  rate_limit_rpm: 500      # Requests per minute
  rate_limit_tpm: 30000    # Tokens per minute
  rate_limit_rpd: 10000    # Requests per day
  
  # Cost estimation (USD per 1K tokens, approximate)
  cost_per_1k_input: 0.03
  cost_per_1k_output: 0.06
  
  # Specializations
  specializations:
    - code_generation
    - general
    - documentation
    - testing
  
  # Model-specific settings
  models:
    gpt-4:
      max_tokens: 8192
      cost_per_1k_input: 0.03
      cost_per_1k_output: 0.06
    gpt-4-turbo:
      max_tokens: 128000
      cost_per_1k_input: 0.01
      cost_per_1k_output: 0.03
    gpt-3.5-turbo:
      max_tokens: 4096
      cost_per_1k_input: 0.001
      cost_per_1k_output: 0.002

anthropic:
  enabled: false  # Will be enabled automatically if API key is provided
  name: "Anthropic Claude"
  base_url: "https://api.anthropic.com/v1"
  model: "claude-3-sonnet-20240229"
  max_tokens: 4000
  temperature: 0.7
  timeout: 30
  
  # Rate limits
  rate_limit_rpm: 1000
  rate_limit_tpm: 100000
  rate_limit_rpd: 10000
  
  # Cost estimation (USD per 1K tokens, approximate)
  cost_per_1k_input: 0.003
  cost_per_1k_output: 0.015
  
  # Specializations
  specializations:
    - analysis
    - code_review
    - troubleshooting
    - documentation
  
  # Model-specific settings
  models:
    claude-3-opus-20240229:
      max_tokens: 4096
      cost_per_1k_input: 0.015
      cost_per_1k_output: 0.075
    claude-3-sonnet-20240229:
      max_tokens: 4096
      cost_per_1k_input: 0.003
      cost_per_1k_output: 0.015
    claude-3-haiku-20240307:
      max_tokens: 4096
      cost_per_1k_input: 0.00025
      cost_per_1k_output: 0.00125

grok:
  enabled: false  # Will be enabled automatically if API key is provided
  name: "Grok"
  base_url: "https://api.x.ai/v1"
  model: "grok-beta"
  max_tokens: 4000
  temperature: 0.7
  timeout: 30
  
  # Rate limits (estimated)
  rate_limit_rpm: 1000
  rate_limit_tpm: 50000
  rate_limit_rpd: 10000
  
  # Cost estimation (placeholder - actual pricing TBD)
  cost_per_1k_input: 0.01
  cost_per_1k_output: 0.02
  
  # Specializations
  specializations:
    - monitoring
    - troubleshooting
    - optimization
    - analysis
  
  # Grok-specific features
  features:
    real_time_data: true
    web_search: true
    current_events: true

# Provider Selection Strategies
selection_strategies:
  # Cost optimization
  cost_optimized:
    primary_factors:
      - cost_per_token
      - success_rate
    fallback_factors:
      - response_time
      - availability
  
  # Speed optimization  
  speed_optimized:
    primary_factors:
      - avg_response_time
      - queue_length
    fallback_factors:
      - success_rate
      - cost_per_token
  
  # Quality optimization
  quality_optimized:
    primary_factors:
      - success_rate
      - specialization_match
    fallback_factors:
      - response_time
      - cost_per_token

# Fallback and redundancy
fallback:
  enabled: true
  max_retries: 3
  retry_delay: 5
  
  # Fallback order by task type
  fallback_chains:
    code_generation:
      - openai
      - anthropic
      - grok
    troubleshooting:
      - anthropic
      - grok
      - openai
    analysis:
      - anthropic
      - openai
      - grok
    monitoring:
      - grok
      - openai
      - anthropic
