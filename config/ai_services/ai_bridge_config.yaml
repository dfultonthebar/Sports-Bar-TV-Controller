
# AI-to-AI Communication Bridge Configuration
# ==========================================

ai_bridge:
  enabled: true
  log_level: INFO
  max_concurrent_tasks: 10
  task_timeout: 300
  health_check_interval: 30

processing:
  num_workers: 3
  queue_size: 100
  retry_attempts: 3
  retry_delay: 5

collaboration:
  enabled: true
  default_consensus_providers: 2
  max_workflow_steps: 10
  workflow_timeout: 600
  
  # Workflow preferences by task type
  workflow_preferences:
    troubleshooting: parallel_consensus
    code_generation: sequential_refinement
    code_review: parallel_consensus
    analysis: parallel_consensus
    optimization: single_best
    documentation: single_best
    testing: load_balanced
    deployment: single_best
    monitoring: speed_optimized
    general: load_balanced

coordination:
  # Provider specializations for intelligent routing
  provider_specializations:
    openai:
      - code_generation
      - general
      - documentation
    anthropic:
      - analysis
      - code_review
      - troubleshooting
    grok:
      - monitoring
      - troubleshooting
      - optimization
  
  # Load balancing settings
  load_balancing:
    enabled: true
    max_tasks_per_provider: 5
    health_check_weight: 0.3
    response_time_weight: 0.4
    success_rate_weight: 0.3

monitoring:
  metrics_enabled: true
  metrics_interval: 60
  performance_tracking: true
  
  alert_thresholds:
    error_rate: 0.1
    response_time_ms: 30000
    queue_size: 50
    memory_usage_mb: 1000
  
  # Export settings
  export:
    enabled: false
    format: json  # json or prometheus
    interval: 300
    retention_hours: 24

security:
  # API key encryption (if implemented)
  encrypt_api_keys: false
  
  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst_limit: 20
  
  # Request validation
  validation:
    max_prompt_length: 50000
    max_context_size: 100000
    allowed_task_types:
      - troubleshooting
      - code_generation
      - code_review
      - analysis
      - optimization
      - documentation
      - testing
      - deployment
      - monitoring
      - general

# Integration with existing system
integration:
  system_manager:
    enabled: true
    auto_start: true
    fallback_to_basic: true
  
  installation_monitor:
    enabled: true
    auto_trigger_collaboration: true
    collaboration_threshold: medium  # low, medium, high, critical
  
  git_conflict_resolver:
    enabled: true
    use_ai_assistance: true
    consensus_providers: 2
