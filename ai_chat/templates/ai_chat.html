<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏈 Sports Bar AI Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            background: rgba(0, 255, 136, 0.1);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 { color: #00ff88; font-size: 2em; margin-bottom: 5px; }
        .status { color: #00ff88; font-size: 0.9em; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.user {
            background: rgba(0, 255, 136, 0.2);
            margin-left: auto;
            text-align: right;
        }
        .message.ai {
            background: rgba(255, 255, 255, 0.1);
            margin-right: auto;
        }
        .message.system {
            background: rgba(255, 193, 7, 0.2);
            margin: 0 auto;
            text-align: center;
            font-style: italic;
        }
        .quick-commands {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .quick-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .quick-btn:hover {
            background: rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
        }
        .message-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .send-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .send-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }
        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="connection-status">
            <div class="status-dot"></div>
            <span>Connected</span>
        </div>
        
        <div class="header">
            <h1>🏈 Sports Bar AI Assistant</h1>
            <div class="status">Real-time AI chat for your Sports Bar TV Controller</div>
        </div>
        
        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="quick-commands">
            <button class="quick-btn" onclick="sendQuickMessage('Help')">❓ Help</button>
            <button class="quick-btn" onclick="sendQuickMessage('System Status')">⚙️ System Status</button>
            <button class="quick-btn" onclick="sendQuickMessage('TV Controls')">📺 TV Controls</button>
            <button class="quick-btn" onclick="sendQuickMessage('Audio System')">🔊 Audio System</button>
            <button class="quick-btn" onclick="sendQuickMessage('Sports Games')">🏈 Sports Games</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" class="message-input" 
                   placeholder="Ask me about TVs, audio, sports, or system status..." 
                   onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="send-btn">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');

        socket.on('connect', function() {
            console.log('Connected to AI Chat Server');
        });

        socket.on('message', function(data) {
            addMessage(data.content, data.type, data.timestamp);
        });

        function addMessage(content, type, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = content.replace(/\n/g, '<br>');
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                addMessage(message, 'user', new Date().toISOString());
                socket.emit('user_message', { message: message });
                messageInput.value = '';
            }
        }

        function sendQuickMessage(message) {
            addMessage(message, 'user', new Date().toISOString());
            socket.emit('user_message', { message: message });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Focus on input when page loads
        window.onload = function() {
            messageInput.focus();
        };
    </script>
</body>
</html>
